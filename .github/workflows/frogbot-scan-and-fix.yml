name: "Frogbot Scan and Fix"
on:
  workflow_dispatch:
  schedule:
    # The repository will be scanned once a day at 00:00 GMT.
    - cron: "0 0 * * *"
permissions:
  contents: write
  pull-requests: write
  security-events: write
jobs:
  create-fix-pull-requests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # The repository scanning will be triggered periodically on the following branches.
        branch: [ "main" ]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          
      # Install prerequisites
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          
      # Download and execute the Frogbot V3 CLI manually
      - name: Download and run Frogbot V3
        env:
          # [V3 Mandatory] Explicit Git repository context
          JF_GIT_PROVIDER: "github"
          JF_GIT_OWNER: ${{ github.repository_owner }}
          JF_GIT_REPO: ${{ github.event.repository.name }}
          JF_GIT_BASE_BRANCH: ${{ matrix.branch }}
          JF_GIT_API_ENDPOINT: "https://api.github.com"
          
          # [Mandatory] JFrog platform URL
          JF_URL: ${{ secrets.JF_URL }}
          
          # [Mandatory] JFrog access token with 'read' permissions on Xray service
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          
          # [Mandatory] The GitHub token automatically generated for the job
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # [Optional configuration parameters from your original file]
          JF_REQUIREMENTS_FILE: "requirements.txt"
          JF_FIXABLE_ONLY: "TRUE"
          
          # JFrog CLI settings
          JFROG_CLI_LOG_LEVEL: "DEBUG"
          CI: "TRUE"
        run: |
          curl -fSL -o frogbot "https://releases.jfrog.io/artifactory/frogbot/v3/3.1.3/frogbot-linux-amd64/frogbot"
          chmod +x frogbot
          ./frogbot scan-repository
